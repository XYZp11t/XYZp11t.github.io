      function isLatex(option) {
  // Comprueba si la opción comienza y termina con '\\(' y '\\)'
  return option.trim().startsWith('\\(') && option.trim().endsWith('\\)');
}

function getUniqueIncorrectOption(incorrectOptionArrays, usedIncorrectIndexes) {
  let incorrectIndex;
  do {
    incorrectIndex = Math.floor(Math.random() * incorrectOptionArrays.length);
  } while (usedIncorrectIndexes.includes(incorrectIndex));
  return incorrectIndex;
}

function setOptions(index) {
  const correctOptionIndex = Math.floor(Math.random() * 4);
  const usedIncorrectIndexes = [];

  optionElements.forEach((element, i) => {
  const textElement = element.querySelector(".option-text");
  if (i === correctOptionIndex) {
    // Comprobar si la opción correcta debe ser interpretada como LaTeX
    if (isLatex(optionTrue[index])) {
  // Renderizar como LaTeX en el elemento de texto
  // Nota: Se quitan los delimitadores '\\(' y '\\)' antes de renderizar
  katex.render(optionTrue[index].slice(2, -2), textElement);
} else {
  // Establecer como texto normal
  textElement.innerText = optionTrue[index];
}
  } else {
    const incorrectOptionArray = [optionFalseOne, optionFalseTwo, optionFalseThree];
    const uniqueIncorrectIndex = getUniqueIncorrectOption(incorrectOptionArray, usedIncorrectIndexes);
    usedIncorrectIndexes.push(uniqueIncorrectIndex);
    const incorrectOption = incorrectOptionArray[uniqueIncorrectIndex][index];
    // Comprobar si la opción incorrecta debe ser interpretada como LaTeX
    if (isLatex(incorrectOption)) {
  // Renderizar como LaTeX en el elemento de texto
  // Nota: Se quitan los delimitadores '\\(' y '\\)' antes de renderizar
  katex.render(incorrectOption.slice(2, -2), textElement);
} else {
  // Establecer como texto normal
  textElement.innerText = incorrectOption;
}
  }
});

const duration = 1; // Duración de la animación en segundos

      function transition() {
        const icono = document.querySelector("#icono");
        const questionNumber = document.querySelector("#question_number");

        // Obtiene las coordenadas del elemento question_number
        const questionNumberRect = questionNumber.getBoundingClientRect();

        // Posiciona el icono sobre question_number
        icono.style.position = "absolute";
        icono.style.top = "100px";
        icono.style.left = "-300px";

        // Obtiene el centro del icono
        const centerX = icono.clientWidth / 2;
        const centerY = icono.clientHeight / 2;

        // Aplica la transformación de origen al centro del icono
        gsap.set(icono, {
          transformOrigin: `${centerX}px ${centerY}px`,
        });

         // Reinicia la animación
         gsap.set(icono, {
           rotation: 0,
           scale: 10, // Escala inicial (10 veces el tamaño original)
         });
       
         const tl = gsap.timeline({
           defaults: {
             duration: duration,
             ease: "none",
           },
         });

        tl.to(icono, {
          rotation: 270, // Grados de rotación
          scale: 0.00005, // Escala final (0.0005% del tamaño original)
        });
      }


function executeTransitionEvery(interval) {
  const icono = document.querySelector("#icono");
  icono.style.display = "block";
  transition();
  setTimeout(() => {
    icono.style.display = "none";
    executeTransitionEvery(interval);
  }, interval + (1000 * duration));
}

setTimeout(() => {
  executeTransitionEvery(13000);
}, 13000);

function setQuestionText(index) {
  const questionText = questions[index];
  const questionElement = document.getElementById("question");
  const questionNumberElement = document.getElementById("question_number_text");
  const teamImageElement = document.getElementById("team_image");
  questionElement.innerHTML = `<span class="question-number"></span> ${questionText}`;
  questionNumberElement.innerText = index;
  teamImageElement.src = "./imagenes/" + images[index]; // Añade el prefijo "./" a la fuente de la imagen

  gsap.fromTo(
    questionElement,
    { opacity: 0, scale: 0.5 },
    { duration: 0.5, opacity: 1, scale: 1, ease: "power3.out" }
  );
}
